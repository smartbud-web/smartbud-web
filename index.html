<!DOCTYPE html>
<html lang="zh-HK" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bud 樂芽 | Premium Baby & Toddler Brands Curator Hong Kong</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900;950&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-brand-50 text-brand-dark overflow-x-hidden antialiased">

    <header class="sticky top-0 z-50 bg-brand-50/95 backdrop-blur-md border-b border-brand-200/40 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20 sm:h-24">
                
                <a href="#" onclick="switchPage('home'); return false;" class="flex items-center gap-3 group">
                    <div class="relative w-12 h-12 flex items-center justify-center bg-brand-100/60 rounded-full border border-brand-800/10 group-hover:scale-105 transition-transform duration-300 company-logo-slot overflow-hidden">
                        </div>
                    <div class="flex flex-col">
                        <span class="font-serif text-xl sm:text-2xl font-black tracking-wide text-brand-700 leading-none" id="nav-brand-title">Smart Bud</span>
                        <span class="text-[10px] font-extrabold tracking-widest text-brand-800 uppercase mt-0.5" id="nav-brand-subtitle">樂芽選品</span>
                    </div>
                </a>

                <nav class="hidden lg:flex items-center gap-5 xl:gap-6">
                    <a href="#" onclick="switchPage('home'); return false;" class="nav-link text-xs xl:text-sm font-bold hover:text-brand-800 transition-colors py-2 border-b-2 border-transparent" id="btn-nav-home">首頁</a>
                    <a href="#" onclick="switchPage('brands'); return false;" class="nav-link text-xs xl:text-sm font-bold hover:text-brand-800 transition-colors py-2 border-b-2 border-transparent" id="btn-nav-brands">代理品牌</a>
                    <a href="#" onclick="switchPage('shop'); return false;" class="nav-link text-xs xl:text-sm font-bold hover:text-brand-800 transition-colors py-2 border-b-2 border-transparent text-brand-800 font-extrabold flex items-center gap-1" id="btn-nav-shop">
                        <i class="fa-solid fa-store text-brand-500"></i> <span id="lbl-nav-shop">線上選品店</span>
                    </a>
                    <a href="#" onclick="switchPage('milestones'); return false;" class="nav-link text-xs xl:text-sm font-bold hover:text-brand-800 transition-colors py-2 border-b-2 border-transparent" id="btn-nav-milestones">成長里程碑</a>
                    <a href="#" onclick="switchPage('about'); return false;" class="nav-link text-xs xl:text-sm font-bold hover:text-brand-800 transition-colors py-2 border-b-2 border-transparent" id="btn-nav-about">關於我們</a>
                    <a href="#" onclick="switchPage('b2b'); return false;" class="nav-link text-xs xl:text-sm font-bold hover:text-brand-800 transition-colors py-2 border-b-2 border-transparent" id="btn-nav-b2b">商務合作 B2B</a>
                </nav>

                <div class="hidden lg:flex items-center gap-4">
                    <button onclick="toggleLanguage()" class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-brand-200 bg-white shadow-sm hover:border-brand-800 hover:text-brand-800 transition-all duration-300 text-xs font-black">
                        <i class="fa-solid fa-globe text-brand-500 animate-[spin_10s_linear_infinite]"></i>
                        <span id="lang-indicator">EN</span>
                    </button>
                    
                    <button onclick="toggleCartDrawer()" class="relative flex items-center gap-2 px-3 py-1.5 rounded-full border border-brand-200 bg-white shadow-sm hover:border-brand-800 transition-all duration-300 text-xs font-black">
                        <i class="fa-solid fa-cart-shopping text-brand-700"></i>
                        <span id="cart-badge-desktop" class="absolute -top-1.5 -right-1.5 bg-brand-800 text-white text-[9px] rounded-full h-4 w-4 flex items-center justify-center font-bold">0</span>
                    </button>

                    <a href="#" onclick="switchPage('b2b'); setTimeout(() => {document.getElementById('b2b-form-section').scrollIntoView({behavior: 'smooth'})}, 450); return false;" class="px-5 py-2.5 rounded-full bg-brand-700 text-white font-extrabold text-sm hover:bg-brand-500 shadow-md transition-all hover:scale-[1.02]" id="btn-nav-contact">
                        聯繫我們
                    </a>
                </div>

                <div class="flex items-center gap-3 lg:hidden">
                    <button onclick="toggleLanguage()" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-full border border-brand-200 bg-white text-xs font-black">
                        <i class="fa-solid fa-globe text-brand-500"></i>
                        <span id="lang-indicator-mobile">EN</span>
                    </button>
                    <button onclick="toggleCartDrawer()" class="relative flex items-center gap-1.5 px-2.5 py-1.5 rounded-full border border-brand-200 bg-white shadow-sm text-xs font-black">
                        <i class="fa-solid fa-cart-shopping text-brand-700"></i>
                        <span id="cart-badge-mobile" class="absolute -top-1.5 -right-1.5 bg-brand-800 text-white text-[9px] rounded-full h-4 w-4 flex items-center justify-center font-bold">0</span>
                    </button>
                    <button id="mobile-menu-btn" onclick="toggleMobileMenu()" class="p-2 text-brand-700 hover:text-brand-800 focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl" id="menu-icon"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden lg:hidden bg-brand-100 border-t border-brand-200/50 shadow-inner px-4 pt-4 pb-6 space-y-3">
            <a href="#" onclick="switchPage('home'); toggleMobileMenu(); return false;" class="block px-4 py-3 rounded-xl bg-white/60 font-bold hover:bg-brand-200/50" id="btn-mob-home">首頁</a>
            <a href="#" onclick="switchPage('brands'); toggleMobileMenu(); return false;" class="block px-4 py-3 rounded-xl bg-white/60 font-bold hover:bg-brand-200/50" id="btn-mob-brands">代理品牌</a>
            <a href="#" onclick="switchPage('shop'); toggleMobileMenu(); return false;" class="block px-4 py-3 rounded-xl bg-white/60 font-bold hover:bg-brand-200/50 text-brand-800" id="btn-mob-shop">線上選品店 🛒</a>
            <a href="#" onclick="switchPage('milestones'); toggleMobileMenu(); return false;" class="block px-4 py-3 rounded-xl bg-white/60 font-bold hover:bg-brand-200/50" id="btn-mob-milestones">成長里程碑</a>
            <a href="#" onclick="switchPage('about'); toggleMobileMenu(); return false;" class="block px-4 py-3 rounded-xl bg-white/60 font-bold hover:bg-brand-200/50" id="btn-mob-about">關於我們</a>
            <a href="#" onclick="switchPage('b2b'); toggleMobileMenu(); return false;" class="block px-4 py-3 rounded-xl bg-white/60 font-bold hover:bg-brand-200/50" id="btn-mob-b2b">商務合作 B2B</a>
            <div class="pt-2">
                <a href="#" onclick="switchPage('b2b'); toggleMobileMenu(); setTimeout(() => {document.getElementById('b2b-form-section').scrollIntoView({behavior: 'smooth'})}, 450); return false;" class="block w-full text-center py-3 rounded-xl bg-brand-700 text-white font-black shadow" id="btn-mob-contact">聯繫我們</a>
            </div>
        </div>
    </header>

    <main class="min-h-screen">
        <div id="page-home" class="page-transition opacity-100 block">
            <section class="relative bg-sun-glow overflow-hidden py-16 sm:py-24 lg:py-28 border-b border-brand-200/30">
                </section>
        </div>

        <div id="page-brands" class="page-transition opacity-0 hidden py-16 sm:py-24">
            </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
